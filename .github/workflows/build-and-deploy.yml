name: Build and Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:
  schedule:
    # At 03:00 PM (UTC)
    - cron: "0 15 * * *"

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    name: Build and Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project sources
        uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run build and execute with Gradle wrapper
        id: gradle
        working-directory: ./
        env:
          PAT: ${{ secrets.PAT }} # Set PAT as ENV variable
        run: |
          ./gradlew build  # Build the project and produce the JAR
          java -jar build/libs/Apollointhehouse-Web-1.0-SNAPSHOT.jar # Run the JAR

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./out --project-name=apollointhehouse-web --branch=${{ github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
